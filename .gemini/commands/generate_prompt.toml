# In: ~/.gemini/commands/generate_prompt.toml
# This command will be invoked via: /generate_prompt

# Defines a custom command to generate a complete prompt for query generation.
# This command automates the process of filling out the prompt template
# by extracting information from a study protocol.

name = "generate_prompt"
description = "Generates and saves a new, runnable Gemini command for a specific study protocol."

# Define the arguments the command will accept.
args = [
    { name = "command_name", description = "The name for the new command to be generated (e.g., run_new_study_extended)." },
    { name = "protocol_path", description = "The absolute path to the PROSPERO/protocol file." },
    { name = "level", description = "The level of prompt to generate: basic, extended, or keywords.", default = "basic" },
    { name = "min_date", description = "The min date for the search (YYYY/MM/DD).", default = "1980/01/01" },
    { name = "max_date", description = "The max date for the search (YYYY/MM/DD).", default = "2025/12/31" }
]

# The prompt that instructs the agent on how to execute the command.
# This is a multi-step process for the agent to follow.
prompt = """
You are an expert assistant for systematic reviews. Your task is to **generate and save a new Gemini command** by following these steps:

1.  **Acknowledge Inputs:** You have been given a name for the new command (`{command_name}`), a path to a protocol file (`{protocol_path}`), a generation level (`{level}`), a minimum date (`{min_date}`), and a maximum date (`{max_date}`).

2.  **Select and Read Files:**
    *   Based on the `{level}` argument, determine which template file to use:
        *   If `{level}` is "basic", use `prompts/prompt_template_basic.md`.
        *   If `{level}` is "extended", use `prompts/prompt_template_extended.md`.
        *   If `{level}` is "keywords", use `prompts/prompt_template_keywords.md`.
    *   Read the content of the selected template file.
    *   Read the content of the protocol file located at `{protocol_path}`.

3.  **Extract Information from Protocol:**
    *   Analyze the content of the protocol file you just read.
    *   Extract the following key pieces of information:
        *   A concise topic description.
        *   The full PICOS summary (Population, Intervention/Exposure, Comparator, Outcomes, Design).
        *   From the PICOS summary, identify the **exposure** (from Intervention/Exposure) and **outcome** (from Outcomes).
    *   Hold this extracted information as structured data.

4.  **Derive and Populate Template:**
    *   Take the content of the template file you selected.
    *   From the `{protocol_path}` (e.g., `studies/study_folder/protocol.md`), derive the **`[STUDY_NAME]`** which is the `study_folder` part.
    *   Systematically replace the following placeholders in the template:
        *   Replace `[PATH TO PROSPERO/PROTOCOL FILE]` with the value of `{protocol_path}`.
        *   Replace `[STUDY_NAME]` with the derived study name.
        *   Replace `[DATE_WINDOW_START]` with the value of `{min_date}`.
        *   Replace `[DATE_WINDOW_END]` with the value of `{max_date}`.
        *   Replace `[CONCISE TOPIC DESCRIPTION]` with the topic you extracted from the protocol.
        *   Replace the PICOS placeholders (`[Describe the patient population]`, etc.) with the corresponding PICOS summary you extracted.
        *   Replace ALL occurrences of `[exposure]` throughout the entire template with the exposure you extracted.
        *   Replace ALL occurrences of `[outcome]` throughout the entire template with the outcome you extracted.

5.  **Generate the New Command File:**
    *   You will now create a new Gemini CLI command file.
    *   The name of the new file will be `.gemini/commands/{command_name}.toml`.
    *   The content for this new file must be a complete TOML command definition. Construct this content as a single string, ensuring the populated prompt from Step 4 is enclosed in triple single quotes (`'''`). The structure should be:

        ```toml
        # In: ~/.gemini/commands/{command_name}.toml
        # This command will be invoked via: /{command_name}

        description = "Runs the generated query prompt for the study based on {protocol_path}."

        prompt = '''
        [INSERT THE FULLY POPULATED PROMPT TEXT FROM STEP 4 HERE]
        '''
        ```
    *   Use the `write_file` tool to create this new file with the specified content.
    *   After writing the file, report that the new command `/{command_name}` has been created successfully.
"""