# In: ~/.gemini/commands/run_sleep.toml
# This command will be invoked via: /run_sleep


description = "Asks the model to run the query generation using the prompt below."

prompt = """

## SYSTEM (role: information specialist & indexer):
- You are an expert information specialist and medical indexer.
- Produce database-ready queries. Verify controlled vocabulary exists for the target DB.
- PubMed: no proximity operators; use MeSH appropriately; use [tiab] for free text; flag uncertain terms as "verify".
- If unsure between recall vs precision, bias to recall; keep a high-precision variant too.


## Documents
- Use PROSPERO that exists in sleep_docs/PROSPERO.md.
- Use the sleep_docs/Search-filters-for-systematic-reviews-and-meta-analyses-sleep-medicine.md as a guidelines for selecting the queries

## INPUT
- TOPIC: Obstructive Sleep Apnea (OSA) & human microbiome — case–control
- DATE WINDOW: <= <2024-08-05>
- DATABASE: PubMed, Embase, WoS, Cochrane

## PICOS (summary)
Population: patients with/without OSA (humans)
Index: OSA (OSA, OSAHS, sleep-disordered breathing)
Comparator: non-OSA controls
Outcomes: microbiome diversity/composition (alpha/beta; OTU/ASV; Shannon/Simpson/Chao1; gut/oral/nasal/airway)
Design: case–control


## OUTPUT (return ALL):
1) Concept→MeSH table (concept | MeSH | tree note | explode? | rationale & source).
2) Concept→Textword table (concept | synonym/phrase | [tiab] | truncation? | source).
3) Three Boolean strategies: High-recall / Balanced / High-precision (one line each).
   **VARIANTS** (run all three for ablation)
      - Variant A (MeSH-heavy): emphasize controlled vocabulary.
      - Variant B (Text-heavy): emphasize synonyms in [tiab].
      - Variant C (Hybrid balanced): best-practice hybrid.
4) PRESS self-check: issues + up to 3 minimal revised queries.
   **PRESS self-check**
      - Issues: bullet points (logic, missing terms, inappropriate limits, spelling, translation).
      - Fixes: up to 3 minimal revisions (full Boolean lines).
5) Translation notes across DBs (explain any vocabulary changes).
6) Date window: please respect <= <2024-08-05>.


## Per-DB instructions (add under SYSTEM)
PubMed: “[Mesh], [tiab]; no proximity; date with [Date - Publication]; no field tags for MeSH.”
Embase: “Specify platform (Ovid or Elsevier). Use Emtree (exp/), proximity (adj/n or NEAR/n), .ti,ab or TITLE-ABS-KEY accordingly.”
WoS: “Use TS=, NEAR/n; provide date range.”
Cochrane: “Use ti,ab,kw; provide line-based sets if needed; NEAR/n; give paste-ready blocks.”

## CONSTRAINTS
- If unsure a MeSH heading exists, flag it as "verify" and supply a free-text fallback.
- Respect the DATE_WINDOW; avoid headings introduced after that date.
- Only use MeSH terms that exist and are appropriate for the date window.
- Prefer broader terms for recall; move narrowing to high-precision variant.


## USER TASK 
Context: I am working on a systematic review, to be published in an international top-tier peer-reviewed scientific journal. The work needs to be of highest possible quality and methodological rigor.
Task description: To be able to capture all relevant literature on the topic, I need to use comprehensive search queries. 
At the same time, the search queries should not be too general/unspecific, to the point that unreasonably large number of results are returned from the searches. 
Your task is to compose comprehensive search queries for this systematic review. Include all relevant search terms, synonyms, and alternative spellings. 
Utilize search operators (e.g., asterisk [*]), field tags, filters, and other relevant syntax, but use exclusion operators (e.g., NOT) and field tags cautiously, so as to not miss relevant studies. 
If you have to choose between higher coverage or higher precision, choose higher coverage. Make use of controlled vocabulary terms for databases that use a controlled vocabulary (e.g., MeSH). 
Ensure that the search queries for all databases contain the same terms (for free search terms; for controlled vocabulary terms, this does not necessarily have to be done unless several/all databases use controlled vocabularies containing the same term). 
For each database, provide the full search query. When possible, provide the full search query in one paragraph, so that it can be copy-pasted directly into the search field; for other databases, where this is not possible (for example Cochrane Library, provide each search set/line so that they may be copypasted.
Below, you may find specific instructions and details about the systematic review and what type of literature I am interested in identifying.
Databases to search: PubMed, EMBASE, Web of Science, and Cochrane Library
Types of studies to include: Case control
Condition or domain being studied: Obstructive sleep apnea–hypopnea syndrome (OSAHS) is characterized by repeated collapse episodes in the upper airway during sleep, resulting in intermittent hypoxia (IH), together with symptoms of sleep fragmentation (SF) and daytime sleepiness. OSAHS is a systemic disorder; it is highly prevalent in Asia and is estimated to occur in 3.7–97.3% of the population [1]. Further, it is one of the most common sleep disorders and is associated with a growing list of OSAHS-induced end-organ morbidities requiring expertise in respiratory medicine, cardiology, neurology, and endocrinology. OSAHS-mediated oxidative stress and endothelial dysfunction are associated with the pathogenesis of atherosclerosis and cardiovascular morbidity [2]. In this context, IH/reoxygenation and SF are the key features of OSAHS-enhanced inflammation and the oxidative stress cascade [3, 4]. By activating multiple systemic inflammatory mediators found in immune cells, OSAHS leads to an enhanced, sustained proinflammatory state that contributes to multiorgan morbidities [2], thereby suggesting a linkage with the host’s microbiota.
Participants/population: the research objects are OSA patients and NOSA patients.
Intervention(s)/exposure(s): Patients with OSA
Comparator(s)/control: Patients without OSA
Main outcome(s): α diversity（Observed OTUs，Observed ACE，Observed species，Simpson index，shannon index，chao index）and β diversity.
Additional outcome(s): None

Finally: Add the queries results to the file queries.txt.
   - First remove the old results.
   - Then append the new results.

"""