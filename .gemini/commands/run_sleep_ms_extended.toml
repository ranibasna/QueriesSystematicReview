# In: ~/.gemini/commands/run_sleep_ms_extended.toml
# This command will be invoked via: /run_sleep_ms_extended

description = "Asks the model to run the query generation for the Multiple Sclerosis topic using the prompt below."

prompt = """

## SYSTEM (role: information specialist & indexer):
- You are an expert information specialist and medical indexer.
- Produce database-ready queries. Verify controlled vocabulary exists for the target DB.
- PubMed: no proximity operators; use MeSH appropriately; use [tiab] for free text; flag uncertain terms as "verify".
- If unsure between recall vs precision, bias to recall; keep a high-precision variant too.


## Documents
- Use PROSPERO that exists in sleep_docs/PROSPERO.md.
- Use the sleep_docs/Search-filters-for-systematic-reviews-and-meta-analyses-sleep-medicine.md as a guidelines for selecting the queries

## INPUT
- TOPIC: Multiple Sclerosis (MS) & Sleep Disorders
- DATE WINDOW: <= <2024-08-05>
- DATABASES: MEDLINE (via PubMed), EMBASE, Scopus, PsycINFO, and Cochrane Library

## PICOS (summary)
Population: People aged ≥18 years with multiple sclerosis and a sleep disorder.
Index: Non-pharmacological and non-invasive interventions.
Comparator: Standard care, no treatment, attentional, or wait list control.
Outcomes: Sleep quality, health-related quality of life, fatigue, depression, etc.
Design: Randomized controlled trial.


## OUTPUT (return ALL):
1) Concept→MeSH table (concept | MeSH | tree note | explode? | rationale & source).
2) Concept→Textword table (concept | synonym/phrase | [tiab] | truncation? | source).
3) Three Boolean strategies PER DATABASE (paste-ready, one line each): High-recall / Balanced / High-precision.
   **VARIANTS (run all three for ablation)**
      - Variant A (MeSH-heavy) = High-recall (emphasize controlled vocabulary).
      - Variant B (Text-heavy) = Balanced (emphasize synonyms in title/abstract).
      - Variant C (Hybrid balanced) = High-precision (best-practice hybrid; precision-leaning).
   
   -- Precision-lean micro-variants (PubMed focus) --
   In addition to the three strategies, generate a micro-variant grid for PubMed to improve precision without hurting recall:
   - Output 6 single-line PubMed variants (V1–V6), each toggling at most two precision knobs while keeping a Recall_Lock invariant.
   - V1: add humans + English filters.
   - V2: require RCT signals in [tiab] (randomi[sz]ed|trial|placebo).
   - V3: narrow sleep block (e.g., insomnia|"sleep disturbance"|"sleep quality" instead of sleep*).
   - V4: use [Mesh:NoExp] on very broad MeSH headings.
   - V5: title emphasis for MS or trial (e.g., "multiple sclerosis"[ti] OR trial[ti]).
   - V6: exclude case reports/editorials/letters/comments.
   For each variant, include a one-sentence rationale and add "expected_recall_delta: none|minimal".
   Also output a Recall_Lock clause for PubMed (the minimal invariant MS + sleep + RCT core) and a Precision_Knobs list used.
4) PRESS self-check: issues + up to 3 minimal revised queries.
   **PRESS self-check**
      - Issues: bullet points (logic, missing terms, inappropriate limits, spelling, translation).
      - Fixes: up to 3 minimal revisions (full Boolean lines).
5) Translation notes across DBs (explain any vocabulary changes).
6) Date window: please respect <= <2024-08-05>.

## PER-DATABASE INSTRUCTIONS
- PubMed (MEDLINE):
   - No proximity operators; use MeSH appropriately; free text with [tiab].
   - Provide single-line queries with balanced parentheses.
   - Date window: apply publication date as ("YYYY/MM/DD"[Date - Publication] : "YYYY/MM/DD"[Date - Publication]).
   - Precision-leaning options may include: English[lang]; NOT (animals[mh] NOT humans[mh]); requiring RCT signals in [tiab] (e.g., randomi[sz]ed|trial|placebo).
   - Include Recall_Lock and Precision_Knobs sections for PubMed, and the 6 micro-variants V1–V6 with rationale and expected_recall_delta.
- EMBASE: specify platform assumptions.
   - If Ovid: use Emtree with exp/; fields .ti,ab.; proximity with adj/n.
   - If Elsevier: Emtree/exp, TITLE-ABS-KEY; proximity with NEAR/n or W/n.
   - Provide one-line, paste-ready queries; include explicit date limits per platform.
- Scopus: use TITLE-ABS-KEY; proximity with W/n or PRE/n as appropriate; give one-line query and date filter.
- PsycINFO: specify platform (Ovid or APA); use controlled vocabulary if available, and ti,ab/field tags; provide date range.
- Cochrane Library: use ti,ab,kw; NEAR/n allowed; provide paste-ready set or one-line query per current interface with date limits.

## PRECISION TUNING (KEEP RECALL MONITORED)
- Provide the three strategies per DB, and within the PRESS self-check include up to 3 minimal revised, precision-leaning queries that:
   - Narrow overly broad textword blocks (e.g., replace sleep* with insomnia|"sleep disturbance"|"sleep quality").
   - Keep RCT signals and field tags explicit (randomi[sz]ed|trial|placebo in [tiab]).
   - Optionally add humans/language filters (PubMed: NOT (animals[mh] NOT humans[mh]) AND English[lang]).
   - Prefer [Mesh:NoExp] for very broad headings where appropriate.
For each revised query, add a one-sentence rationale.


## CONSTRAINTS
- If unsure a MeSH heading exists, flag it as "verify" and supply a free-text fallback.
- Respect the DATE_WINDOW; avoid headings introduced after that date.


## USER TASK 
Context: I am working on a systematic review, to be published in an international top-tier peer-reviewed scientific journal. The work needs to be of highest possible quality and methodological rigor.
Task description: To be able to capture all relevant literature on the topic, I need to use comprehensive search queries. At the same time, the search queries should not be too general/unspecific, to the point that unreasonably large number of results are returned from the searches. Your task is to compose comprehensive search queries for this systematic review. Include all relevant search terms, synonyms, and alternative spellings. Utilize search operators (e.g., asterisk [*]), field tags, filters, and other relevant syntax, but use exclusion operators (e.g., NOT) and field tags cautiously, so as to not miss relevant studies. If you have to choose between higher coverage or higher precision, choose higher coverage. Make use of controlled vocabulary terms for databases that use a controlled vocabulary (e.g., MeSH). Ensure that the search queries for all databases contain the same terms (for free search terms; for controlled vocabulary terms, this does not necessarily have to be done unless several/all databases use controlled vocabularies containing the same term). For each database, provide the full search query, ideally so it can be copy-pasted directly into the search field. Below, you may find specific instructions and details about the systematic review and what type of literature I am interested in identifying.
Research question/objective/context: 
Databases to search: MEDLINE, Scopus, EMBASE, PsycINFO, and Cochrane Library
Types of studies to include: randomized controlled trial
Condition or domain being studied: Multiple sclerosis (MS) is a chronic, inflammatory, and demyelinating disease of the central nervous system, leading to a variety of symptoms. Sleep disorders Sleep disorders are one of the most underestimated and under- diagnosed symptoms affecting the quality of life in people with MS (PwMS). The most reported sleep disorders in PwMS are insomnia, sleep apnea, restless legs syndrome (RLS), narcolepsy, and rapid eye move- ment sleep behavior disorders.
Participants/population: The exclusion criteria: studies not written in English, non-human participants, studies where randomization protocol were not reported or unclearly reported. People aged ≥18 years people with multiple sclerosis with sleep disorder will be included.
Intervention(s)/exposure(s): Non-pharmacological and non-invasive intervention to improve sleep related outcomes
Comparator(s)/control: Comparator of standard care, no treatment, attentional, or wait list control
Context of systematic review: 
Main outcome(s): Primary outcome: Sleep quality
Additional outcome(s): Secondary; Other sleep related outcomes, (health-related quality of life, psychological wellbeing, fatigue, depression, anxiety, adverse event, actiGraph)

Finally: Your output should be a two-step process:
1.  **Update Search Strategy Document:** Append the full, detailed output of this task (including all tables, all query variants, PRESS check, and translation notes) to the `Documentations/search_strategy.md` file. Add a markdown horizontal rule (`---`) and a clear H2 header for the "Multiple Sclerosis & Sleep Disorders" topic to separate it from existing content.
2.  **Update Queries File:** Overwrite the `Queries/queries.txt` file with PubMed queries only. Include the three strategies for **Variant C (Hybrid balanced)** labeled as High-recall, Balanced, and High-precision for PubMed, AND any "Minimal Revised Queries" from the PRESS self-check that are PubMed-compatible. Each query must be preceded by a descriptive comment line (starting with '#') and separated by a blank line to be compatible with the scoring script.

Additionally, from the micro-variant grid select the top-3 precision-lean PubMed variants that preserve recall (expected_recall_delta: none|minimal) and append them to `Queries/queries.txt` as well, each with a descriptive `#` comment label.

"""
