# In: ~/.gemini/commands/run_ai_2022_multidb_extended.toml
# This command will be invoked via: /run_ai_2022_multidb_extended

description = "Runs the multi-database query generation prompt for the study based on studies/ai_2022/prospero_ai_2022.md."

prompt = '''
# Prompt Template for Systematic Review Query Generation (Multi-Database)

This template provides a structured prompt for an LLM to generate comprehensive, balanced, and tailored search queries for multiple databases simultaneously.

---

## SYSTEM (role: information specialist & indexer):
- You are an expert information specialist and medical indexer.
- Your primary goal is to produce a single JSON object containing paste-ready queries for multiple databases.
- You must strictly adhere to the syntax and strategy rules provided for each database.
- If unsure between recall vs precision, bias towards recall, but generate high-precision variants as requested.
- **Pay close attention to the 'Keywords' section of the protocol document. Actively find and include synonyms and controlled vocabulary for these keywords in your concept tables and queries.**

## Documents
- Use the PROSPERO protocol or study description located at: `studies/ai_2022/prospero_ai_2022.md`
- Use the following guidelines for query design: `studies/ai_2022/guidelines.md`
- Use the general guidelines for query design: `studies/ai_2022/general_guidelines.md`

## INPUT
- TOPIC: `Blood pressure in children and adolescents with sleep-disordered breathing`
- DATE WINDOW: `1990/01/01` to `2022/12/31`
- DATABASES: `pubmed,scopus,wos,embase`

## PICOS (summary)
- **Population:** `Children and adolescents (0-18 years) with sleep-disordered breathing (SDB), without congenital heart disease or surgical/CPAP intervention.`
- **Intervention/Exposure:** `A spectrum of SDB (primary snoring, mild, moderate, or severe SDB).`
- **Comparator:** `Healthy children, without any sleep disturbance history.`
- **Outcomes:** `Mean blood pressure (MBP), systolic and diastolic BP during sleep or awake. Additional: BP load, nondipping BP, and SBP Index.`
- **Design:** `Case-control, cross-sectional, and longitudinal cohort studies.`

## USER TASK
Generate comprehensive, database-ready search queries for this systematic review.
- Prioritize recall over precision (when in doubt, choose broader queries)
- Use controlled vocabulary (MeSH, Emtree) where available
- Include synonyms, alternative spellings, and truncation
- Apply exclusion operators (NOT) cautiously to avoid missing studies
- Ensure free-text terms are consistent across databases

---
## DATABASE-SPECIFIC GUIDELINES
## PubMed
- **Syntax**: Use `[tiab]` for title/abstract searches. Use `[mh]` for MeSH terms, `[majr]` for major MeSH terms, and `[tw]` for all text words. Do not use proximity operators. Parentheses must be balanced.
- **Controlled Vocabulary**: Use MeSH (Medical Subject Headings). Validate that terms exist. Use `:NoExp` suffix to prevent automatic explosion of a broad MeSH term.
- **Date Syntax**: Use the format `("YYYY/MM/DD"[Date - Publication] : "YYYY/MM/DD"[Date - Publication])`.
- **Precision_Knobs**:
  
  **Filter Knobs (apply only when appropriate for review scope):**
  - Species filter: `humans[Filter]` - Add to restrict to human subjects only (omit for animal or mixed-species reviews)
  - Language filter: `english[Filter]` - Add to restrict to English-language publications (omit for multilingual reviews)
  
  **Scope Knobs:**
  - Title only: `[ti]` - Restrict key concepts to title field (e.g., `[CONCEPT][ti]`)
  - Major headings: `[majr]` - Use only major MeSH focus headings (e.g., `[CONCEPT][majr]`)
  
  **Vocabulary Knobs:**
  - No explosion: `[Mesh:NoExp]` - Prevent automatic MeSH tree expansion (e.g., `[MESH_TERM][Mesh:NoExp]`)
  
  **Design Knobs:**
  - Study methodology: Require study design terms in title/abstract: `(cohort[tiab] OR follow-up[tiab] OR prospective[tiab] OR retrospective[tiab] OR randomized[tiab] OR randomised[tiab] OR trial[tiab] OR rct[tiab])`
  
  **Exclusion Knobs:**
  - Publication types: `NOT (case reports[pt] OR letter[pt] OR editorial[pt] OR comment[pt])` - Exclude low-quality publication types
  
  **Proximity Knobs:**
  - Not available for PubMed (no proximity operators supported)"

## Scopus
- **Syntax**: Use `TITLE-ABS-KEY(...)` for general topic searches. Field codes like `TITLE(...)` and `ABS(...)` are also available.
- **Controlled Vocabulary**: Primarily uses Emtree, but its coverage can be inconsistent. A combination of Emtree terms and free-text words is recommended.
- **Proximity Operators**: Use `W/n` (words appear within `n` words of each other, in any order) or `PRE/n` (words appear within `n` words, in the specified order).
- **Date Syntax**: Use `PUBYEAR > YYYY` and `PUBYEAR < YYYY`. For example: `(PUBYEAR > 2019 AND PUBYEAR < 2023)`.
- **Precision_Knobs**:
  
  **Filter Knobs:**
  - Document type: `DOCTYPE(ar OR re)` - Limit to articles and reviews
  - Subject area: `SUBJAREA(MEDI)` - Limit to specific subject area (e.g., MEDI for medicine)
  
  **Scope Knobs:**
  - Title only: `TITLE([CONCEPT])` - Restrict key concepts to title field
  
  **Vocabulary Knobs:**
  - Specific terms: Use more specific Emtree terms instead of broad ones
  
  **Proximity Knobs:**
  - Tight proximity: `W/5` or `PRE/5` - Require concepts within 5 words (e.g., `[CONCEPT1] W/5 [CONCEPT2]`)

## Web of Science
- **Syntax**: Use field tags like `TS=` (Topic), `TI=` (Title), `AB=` (Abstract).
- **Controlled Vocabulary**: Limited native thesaurus. Relies heavily on author keywords and `KeyWords Plus`.
- **Proximity Operators**: `NEAR/n` or `SAME` (same sentence).
- **Date Syntax**: Use the format `PY=(YYYY-YYYY)`.
- **Precision_Knobs**:
  
  **Filter Knobs:**
  - Document type: `DT=(Article OR Review)` - Limit to articles and reviews
  - Subject category: `WC=([CATEGORY])` - Refine by Web of Science Categories (e.g., `WC=(NEUROSCIENCES)`)
  
  **Scope Knobs:**
  - Title only: `TI=([CONCEPT])` - Search for key concepts in title field only
  
  **Proximity Knobs:**
  - Tight proximity: `NEAR/5` - Require concepts within 5 words (e.g., `[CONCEPT1] NEAR/5 [CONCEPT2]`)
  - Same sentence: `SAME` - Require concepts in same sentence

## Embase

- **Date Syntax**: Date filtering varies by platform. For inline queries, OMIT date filters entirely and apply them through the platform's interface after execution. DO NOT use `limit to yr=` syntax in inline queries.

- **Syntax**: On platforms like Ovid, use `.ti,ab.` for title/abstract. Use field codes like `.ti.` or `.ab.`.
- **Controlled Vocabulary**: Emtree is the primary thesaurus. Use the format `'term'/exp` to search for a term and explode it. Use `'term'/de` for the term without explosion.
- **Proximity Operators**: Use `ADJn` where `n` is the number of words apart.
- **Date Syntax**: `<YYYYMMDD>.dt.`
- **Precision_Knobs**:
  
  **Filter Knobs:**
  - Publication type: `limit to article or review` - Limit to articles and reviews
  
  **Scope Knobs:**
  - Title only: `.ti.` - Search for concepts in title field only (e.g., `[CONCEPT].ti.`)
  - Major focus: `*[TERM]` - Find articles where the term is a primary subject (e.g., `*'dementia'`)
  
  **Vocabulary Knobs:**
  - No explosion: `'[TERM]'/de` - Use Emtree term without explosion (e.g., `'dementia'/de` instead of `'dementia'/exp`)
  
  **Proximity Knobs:**
  - Adjacent terms: `ADJ5` - Require concepts within 5 words (e.g., `'[CONCEPT1]':ti,ab ADJ5 '[CONCEPT2]':ti,ab`)

---

## Precision_Knobs Framework

The DATABASE-SPECIFIC GUIDELINES section above contains categorized Precision_Knobs for each database. These knobs are organized into functional categories:

- **Filter Knobs:** Species, language, document type, subject area restrictions
- **Scope Knobs:** Field restrictions (title, abstract), major/focus headings
- **Vocabulary Knobs:** Explosion control, term specificity
- **Design Knobs:** Study methodology requirements
- **Exclusion Knobs:** Publication type filters
- **Proximity Knobs:** Term co-occurrence requirements

When generating micro-variants in extended/exhaustive levels:
- **Filter-based variant:** Uses knobs from the "Filter Knobs" category
- **Field/Scope-based variant:** Uses knobs from the "Scope Knobs" category
- **Proximity-based variant:** Uses knobs from the "Proximity Knobs" category (or falls back to "Scope Knobs" for databases without proximity operators like PubMed)

Note: Placeholders like `[CONCEPT]`, `[TERM]`, `[MESH_TERM]` should be replaced with actual study-specific concepts from your PICOS framework.

## OUTPUT (Your entire response should be a single block of text containing the following sections)

### 1. Concept Tables (Markdown)
- **Concept→MeSH/Emtree table:** (concept | term | tree note | explode? | rationale & source).
- **Concept→Textword table:** (concept | synonym/phrase | field | truncation? | source).

### 2. JSON Query Object (MUST be a single valid JSON code block)
Generate **6 queries** for each database by following this specific recipe:
1.  **High-recall:** (Emphasize controlled vocabulary, broad terms).
2.  **Balanced:** (A hybrid of controlled vocabulary and free-text synonyms).
3.  **High-precision:** (Emphasize major focus terms and specific synonyms).
4.  **Micro-variant 1 (Filter-based):** Start with the 'Balanced' query and add a relevant filter. Look under "Filter Knobs" in the Precision_Knobs section for the current database (e.g., `humans[Filter]` for PubMed, `DOCTYPE(ar OR re)` for Scopus).
5.  **Micro-variant 2 (Field/Scope-based):** Start with the 'Balanced' query and increase precision by narrowing the search scope. Look under "Scope Knobs" in the Precision_Knobs section (e.g., `[ti]` for PubMed, `TITLE(...)` for Scopus).
6.  **Micro-variant 3 (Proximity-based):** Start with the 'Balanced' query and increase precision using proximity operators. Look under "Proximity Knobs" in the Precision_Knobs section (e.g., `W/5` for Scopus, `ADJ5` for Embase). 
   
   **For databases without proximity operators (e.g., PubMed):** Fall back to the "Scope Knobs" category and prefer major heading/focus mechanisms (e.g., `[majr]` for PubMed, `*term` for Embase). If no major heading mechanism exists, use title restriction from Scope Knobs.

To generate these queries, you must use the `Precision_Knobs` list found in the `DATABASE-SPECIFIC GUIDELINES` section, which is visible to you in this prompt. Return a single, valid JSON code block containing all the queries. The keys must be the database names from the `INPUT` section. The value for each key must be an array of strings, with each string being a complete, paste-ready query. For each query, include a leading comment line explaining the strategy.

### 3. PRESS Self-Check (JSON Patch)
- After generating the main JSON Query Object, critically review your own work.
- If you identify any significant issues (e.g., a missing synonym, a logical error), provide up to **2 revised queries** in a `json_patch` object.
- The `json_patch` object must use keys corresponding to the database and the 0-based index of the query to be replaced.
- **Example `json_patch`:**
  ```json
  {
    "json_patch": {
      "pubmed": {
        "0": "# High-recall (revised): (the new, corrected query...)"
      }
    }
  }
  ```
- If no revisions are needed, you must return an empty `json_patch` object: `{ "json_patch": {} }`.
- **Translation Notes:** Also include any notes on significant vocabulary or syntax changes made between databases.


## Expected JSON Output Format

Your JSON Query Object should follow this structure, with database names as keys and arrays of query strings as values. Each query string must include a leading comment line (starting with '#') explaining the strategy:

```json
{
  "pubmed": [
    "# High-recall: ...",
    "# Balanced: ...",
    "# High-precision: ...",
    "# Micro-variant 1: ...",
    "# Micro-variant 2: ...",
    "# Micro-variant 3: ..."
  ],
  "scopus": [
    "# High-recall: ...",
    "# Balanced: ...",
    "# High-precision: ...",
    "# Micro-variant 1: ...",
    "# Micro-variant 2: ...",
    "# Micro-variant 3: ..."
  ]
}
```

Note: The number of queries per database depends on the level (basic: 3, extended: 6, keywords: 4, exhaustive: 9).



---

## FINAL TASK: Update Project Files
Based on the generated content, perform the following steps:

1.  **Update Search Strategy Document:** Overwrite the `studies/ai_2022/search_strategy.md` file with the full, detailed output of this task (including all tables, the final JSON query object, the JSON patch, and all notes).

2.  **Generate a Query File for Each Database:**
    - First, apply any revisions from the `json_patch` object to the main 
     `JSON Query Object` (replace queries at specified indices).
    - For each database key in the now-corrected query object:
      - Determine the correct filename:
        - If the key is `pubmed`, the filename is `studies/ai_2022/queries.txt`.
        - For all other keys, the filename is `studies/ai_2022/queries_{database_name}.txt` (e.g., `queries_scopus.txt`).
      - Write the list of corrected queries from the JSON object into that file. Each query must be separated by a blank line.
'''
