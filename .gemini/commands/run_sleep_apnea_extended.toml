# In: ~/.gemini/commands/run_sleep_apnea_extended.toml
# This command will be invoked via: /run_sleep_apnea_extended

description = "Asks the model to run the query generation for the Sleep Apnea and Dementia topic using the prompt below, including extra micro-variants."

prompt = '''

## SYSTEM (role: information specialist & indexer):
- You are an expert information specialist and medical indexer.
- Produce database-ready queries. Verify controlled vocabulary exists for the target DB.
- PubMed: no proximity operators; use MeSH appropriately; use [tiab] for free text; flag uncertain terms as "verify".
- If unsure between recall vs precision, bias to recall; keep a high-precision variant too.
- **Pay close attention to the 'Keywords' section of the protocol document. Actively find and include synonyms and MeSH terms for these keywords in your concept tables and queries.**


## Documents
- Use the PROSPERO protocol or study description located at: `studies/sleep_apnea/prospero-sleep-apnea-dementia.md`
- Use the sleep_docs/Search-filters-for-systematic-reviews-and-meta-analyses-sleep-medicine.md as a guidelines for selecting the queries

## INPUT
- TOPIC: The Association Between Sleep Apnea and Dementia
- DATE WINDOW: Inception to 2021/03/01
- DATABASES: MEDLINE (via PubMed), EMBASE, Scopus, PsycINFO, Cochrane Library, Web of Science Core Collection

## PICOS (summary)
- **Population:** Patients with a diagnosis of sleep apnea (confirmed by polysomnography or oximetry).
- **Exposure:** Presence of sleep apnea.
- **Comparator:** Patients without sleep apnea.
- **Outcomes:** Incidence of dementia (all-cause), Alzheimer’s disease, Parkinson’s disease dementia, Lewy body dementia, frontotemporal dementia, vascular dementia, or mixed dementia.
- **Design:** Prospective or retrospective cohort studies; randomized controlled trials.


## OUTPUT (return ALL):
1) **Concept→MeSH table:** (concept | MeSH | tree note | explode? | rationale & source).
2) **Concept→Textword table:** (concept | synonym/phrase | [tiab] | truncation? | source).
3) **Three Boolean strategies PER DATABASE** (paste-ready, one line each): High-recall / Balanced / High-precision.
   - **Variant A (MeSH-heavy)** = High-recall (emphasize controlled vocabulary).
   - **Variant B (Text-heavy)** = Balanced (emphasize synonyms in title/abstract).
   - **Variant C (Hybrid balanced)** = High-precision (best-practice hybrid; precision-leaning).
   
   -- **Precision-lean micro-variants (PubMed focus)** --
   In addition to the three main strategies, generate a micro-variant grid for PubMed to improve precision:
   - Output 6 single-line PubMed variants (V1–V6), each toggling at most two precision knobs while keeping a Recall_Lock invariant.
   - **V1:** add humans + English filters.
   - **V2:** require cohort or trial signals in [tiab] (e.g., cohort|follow-up|prospective|retrospective|randomi[sz]ed|trial|placebo).
   - **V3:** narrow dementia block (e.g., "Alzheimer disease"|"Lewy Body Disease"|"Vascular Dementia" instead of dementia*).
   - **V4:** use [Mesh:NoExp] on very broad MeSH headings (like "Dementia").
   - **V5:** title emphasis for sleep apnea or dementia (e.g., "sleep apnea"[ti] OR dementia[ti]).
   - **V6:** exclude case reports/editorials/letters/comments.
   For each variant, include a one-sentence rationale and add "expected_recall_delta: none|minimal".
   Also output a **Recall_Lock** clause for PubMed (the minimal invariant Sleep Apnea + Dementia + Study Design core) and a **Precision_Knobs** list used.

4) **PRESS self-check:** issues + up to 3 minimal revised queries.
   - **Issues:** bullet points (logic, missing terms, inappropriate limits, spelling, translation).
   - **Fixes:** up to 3 minimal revisions (full Boolean lines).

5) **Translation notes** across DBs (explain any vocabulary changes).


## PER-DATABASE INSTRUCTIONS
- **PubMed (MEDLINE):**
   - No proximity operators; use MeSH appropriately; free text with [tiab].
   - Provide single-line queries with balanced parentheses.
   - Date window: apply publication date as `("0001/01/01"[Date - Publication] : "2021/03/01"[Date - Publication])`.

- **EMBASE:** specify platform assumptions (e.g., Ovid or Elsevier.com).
- **Scopus:** use TITLE-ABS-KEY; proximity with W/n or PRE/n.
- **Cochrane Library:** use ti,ab,kw; NEAR/n allowed.
- **Web of Science:** use `TS=(...)` for Topic search.

## USER TASK 
Context: I am working on a systematic review, to be published in an international top-tier peer-reviewed scientific journal. The work needs to be of highest possible quality and methodological rigor.
Task description: To be able to capture all relevant literature on the topic, I need to use comprehensive search queries. At the same time, the search queries should not be too general/unspecific, to the point that unreasonably large number of results are returned from the searches. Your task is to compose comprehensive search queries for this systematic review. Include all relevant search terms, synonyms, and alternative spellings. Utilize search operators (e.g., asterisk [*]), field tags, filters, and other relevant syntax, but use exclusion operators (e.g., NOT) and field tags cautiously, so as to not miss relevant studies. If you have to choose between higher coverage or higher precision, choose higher coverage. Make use of controlled vocabulary terms for databases that use a controlled vocabulary (e.g., MeSH). Ensure that the search queries for all databases contain the same terms (for free search terms; for controlled vocabulary terms, this does not necessarily have to be done unless several/all databases use controlled vocabularies containing the same term). For each database, provide the full search query, ideally so it can be copy-pasted directly into the search field. Below, you may find specific instructions and details about the systematic review and what type of literature I am interested in identifying.

Research question/objective/context: To assess the evidence for an association between sleep apnea and the incidence of dementia (all-cause) and specific dementia phenotypes.
Databases to search: MEDLINE (via PubMed), EMBASE, Scopus, PsycINFO, Cochrane Library, Web of Science Core Collection
Types of studies to include: Prospective or retrospective cohort studies; randomized controlled trials.
Condition or domain being studied: The association between Sleep Apnea (a sleep-related breathing disorder) and the subsequent incidence of various forms of Dementia, including Alzheimer’s disease, Lewy body disease, and vascular dementia.
Participants/population: Patients with a diagnosis of sleep apnea confirmed by polysomnography (PSG) or overnight oximetry. No age limit is specified. Studies lacking clear diagnostic criteria for sleep apnea are excluded.
Intervention(s)/exposure(s): The presence of sleep apnea.
Comparator(s)/control: Patients without sleep apnea.
Main outcome(s): Incidence (onset) of dementia (all-cause).
Additional outcome(s): Incidence of specific dementia phenotypes, including Alzheimer’s disease, Parkinson’s disease dementia, Lewy body dementia, frontotemporal dementia, vascular dementia, or mixed dementia.


## FINAL TASK: Update Project Files
Based on the generated content, perform the following two steps:

1.  **Update Search Strategy Document:** Overwrite the `studies/sleep_apnea/search_strategy.md` file with the full, detailed output of this task (including all tables, all query variants, PRESS check, and translation notes).

2.  **Update Queries File:** Overwrite the `studies/sleep_apnea/queries.txt` file with the generated **PubMed queries only**. Include the three main strategies (High-recall, Balanced, and High-precision), AND any "Minimal Revised Queries" from the PRESS self-check that are PubMed-compatible. Each query must be preceded by a descriptive comment line (starting with '#') and separated by a blank line to be compatible with the scoring script.

    **Additionally, from the micro-variant grid select the top-3 precision-lean PubMed variants that preserve recall (expected_recall_delta: none|minimal) and append them to `studies/sleep_apnea/queries.txt` as well, each with a descriptive `#` comment label.**
'''
