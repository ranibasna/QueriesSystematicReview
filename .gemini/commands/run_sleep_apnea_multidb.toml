- **Population:** `The population being studied consists of patients with sleep apnea diagnosed either by a polysomnography study or an overnight oximetry study. The threshold of apnea-hypopnea index (AHI) or oxygen desaturation index (ODI) must be clearly specified. Studies in which the diagnosis criteria for sleep apnea are not specified or rely on other methods are excluded. There will be no age limit.`
